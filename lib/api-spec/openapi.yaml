openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ThetaFrame API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: daily-frames
    description: Daily frame operations
  - name: weekly-frames
    description: Weekly frame operations
  - name: vision-frames
    description: Vision tracker operations
  - name: user-mode
    description: User mode and colour state
  - name: bizdev
    description: BizDev brand/client CRM
  - name: life-ledger
    description: Life Ledger personal obligations tracker
  - name: reach
    description: REACH file bundle manager
  - name: ai-drafts
    description: AI draft review operations
  - name: storage
    description: Object storage uploads
  - name: admin
    description: Admin user and permission management
  - name: me
    description: Current user context

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /daily-frames:
    get:
      operationId: listDailyFrames
      tags: [daily-frames]
      summary: List all daily frames for the current user
      responses:
        "200":
          description: List of daily frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyFrame"
    post:
      operationId: createDailyFrame
      tags: [daily-frames]
      summary: Create or update a daily frame (date in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyFrameBody"
      responses:
        "200":
          description: Created or updated daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"

  /daily-frames/{date}:
    get:
      operationId: getDailyFrame
      tags: [daily-frames]
      summary: Get daily frame for a date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertDailyFrame
      tags: [daily-frames]
      summary: Create or update a daily frame
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDailyFrameBody"
      responses:
        "200":
          description: Upserted daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"

  /daily-frames/recent:
    get:
      operationId: getRecentDailyFrames
      tags: [daily-frames]
      summary: Get recent daily frames (last 7 days)
      responses:
        "200":
          description: List of recent daily frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyFrame"

  /weekly-frames:
    get:
      operationId: listWeeklyFrames
      tags: [weekly-frames]
      summary: List all weekly frames for the current user
      responses:
        "200":
          description: List of weekly frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyFrame"
    post:
      operationId: createWeeklyFrame
      tags: [weekly-frames]
      summary: Create or update a weekly frame (weekStart in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeeklyFrameBody"
      responses:
        "200":
          description: Created or updated weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"

  /weekly-frames/{weekStart}:
    get:
      operationId: getWeeklyFrame
      tags: [weekly-frames]
      summary: Get weekly frame for a week
      parameters:
        - name: weekStart
          in: path
          required: true
          schema:
            type: string
            description: Week start date in YYYY-MM-DD format (Monday)
      responses:
        "200":
          description: Weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertWeeklyFrame
      tags: [weekly-frames]
      summary: Create or update a weekly frame
      parameters:
        - name: weekStart
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWeeklyFrameBody"
      responses:
        "200":
          description: Upserted weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"

  /vision-frames:
    get:
      operationId: getVisionFrameCollection
      tags: [vision-frames]
      summary: Get the current user's vision frame (collection alias)
      responses:
        "200":
          description: Vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createVisionFrame
      tags: [vision-frames]
      summary: Create or update the user's vision frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVisionFrameBody"
      responses:
        "200":
          description: Created or updated vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"

  /vision-frames/me:
    get:
      operationId: getVisionFrame
      tags: [vision-frames]
      summary: Get the user's vision frame
      responses:
        "200":
          description: Vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertVisionFrame
      tags: [vision-frames]
      summary: Create or update the user's vision frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVisionFrameBody"
      responses:
        "200":
          description: Upserted vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"

  /bizdev/brands:
    get:
      operationId: listBizdevBrands
      tags: [bizdev]
      summary: List all brand leads for the current user
      responses:
        "200":
          description: List of brand leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BizdevBrand"
    post:
      operationId: createBizdevBrand
      tags: [bizdev]
      summary: Create a new brand lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BizdevBrandBody"
      responses:
        "201":
          description: Created brand lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BizdevBrand"

  /bizdev/brands/summary:
    get:
      operationId: getBizdevSummary
      tags: [bizdev]
      summary: Get phase counts for the current user's leads
      responses:
        "200":
          description: Phase summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BizdevSummary"

  /bizdev/brands/{id}:
    get:
      operationId: getBizdevBrand
      tags: [bizdev]
      summary: Get a single brand lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BizdevBrand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBizdevBrand
      tags: [bizdev]
      summary: Update a brand lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BizdevBrandBody"
      responses:
        "200":
          description: Updated brand lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BizdevBrand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBizdevBrand
      tags: [bizdev]
      summary: Delete a brand lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /life-ledger/{tab}:
    get:
      operationId: listLifeLedgerEntries
      tags: [life-ledger]
      summary: List entries for a Life Ledger tab
      parameters:
        - name: tab
          in: path
          required: true
          schema:
            type: string
            enum: [people, events, financial, subscriptions, travel, baby]
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeLedgerEntry"
    post:
      operationId: createLifeLedgerEntry
      tags: [life-ledger]
      summary: Create a Life Ledger entry
      parameters:
        - name: tab
          in: path
          required: true
          schema:
            type: string
            enum: [people, events, financial, subscriptions, travel, baby]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeLedgerEntryBody"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEntry"

  /life-ledger/events/reminder-queue:
    get:
      operationId: getLifeLedgerEventReminderQueue
      tags: [life-ledger]
      summary: List reminder-active Life Ledger events for mobile return flows
      responses:
        "200":
          description: Reminder queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEventReminderQueueResponse"

  /life-ledger/events/{id}/execution-state:
    post:
      operationId: updateLifeLedgerEventExecutionState
      tags: [life-ledger]
      summary: Update execution state for a Life Ledger event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeLedgerEventExecutionStateBody"
      responses:
        "200":
          description: Updated Life Ledger event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /life-ledger/events/{id}/reminder-policy:
    post:
      operationId: updateLifeLedgerEventReminderPolicy
      tags: [life-ledger]
      summary: Update reminder policy for a Life Ledger event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeLedgerEventReminderPolicyBody"
      responses:
        "200":
          description: Updated Life Ledger event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/notifications/outbox:
    get:
      operationId: getMobileNotificationsOutbox
      tags: [mobile]
      summary: List queued and recent mobile reminder deliveries
      responses:
        "200":
          description: Mobile notification outbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileNotificationOutboxResponse"

  /mobile/devices:
    get:
      operationId: getMobileDevices
      tags: [mobile]
      summary: List simulated mobile devices for the current user
      responses:
        "200":
          description: Mobile devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileDeviceResponse"

  /mobile/quick-capture:
    post:
      operationId: createMobileQuickCapture
      tags: [mobile]
      summary: Capture a mobile shortcut item into the correct live lane
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileQuickCaptureBody"
      responses:
        "200":
          description: Captured item written to the target lane
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileQuickCaptureResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/devices/register:
    post:
      operationId: registerMobileDevice
      tags: [mobile]
      summary: Register or refresh a simulated mobile device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMobileDeviceBody"
      responses:
        "200":
          description: Registered mobile device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileDevice"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/devices/{id}/deactivate:
    post:
      operationId: deactivateMobileDevice
      tags: [mobile]
      summary: Deactivate a simulated mobile device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated mobile device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileDevice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/notifications/{id}/mark-sent:
    post:
      operationId: markMobileNotificationOutboxItemSent
      tags: [mobile]
      summary: Mark a mobile notification outbox item as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated mobile notification outbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileNotificationOutboxItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/notifications/{id}/simulate-dispatch:
    post:
      operationId: simulateDispatchMobileNotificationOutboxItem
      tags: [mobile]
      summary: Simulate dispatching a queued mobile notification to an active device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateDispatchMobileNotificationBody"
      responses:
        "200":
          description: Updated mobile notification outbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileNotificationOutboxItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Dispatch is not possible in the current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile/notifications/{id}/acknowledge:
    post:
      operationId: acknowledgeMobileNotificationOutboxItem
      tags: [mobile]
      summary: Acknowledge a mobile notification outbox item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated mobile notification outbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileNotificationOutboxItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /life-ledger/{tab}/{id}:
    get:
      operationId: getLifeLedgerEntry
      tags: [life-ledger]
      summary: Get a single Life Ledger entry
      parameters:
        - name: tab
          in: path
          required: true
          schema:
            type: string
            enum: [people, events, financial, subscriptions, travel, baby]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Life Ledger entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLifeLedgerEntry
      tags: [life-ledger]
      summary: Update a Life Ledger entry
      parameters:
        - name: tab
          in: path
          required: true
          schema:
            type: string
            enum: [people, events, financial, subscriptions, travel, baby]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeLedgerEntryBody"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeLedgerEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLifeLedgerEntry
      tags: [life-ledger]
      summary: Delete a Life Ledger entry
      parameters:
        - name: tab
          in: path
          required: true
          schema:
            type: string
            enum: [people, events, financial, subscriptions, travel, baby]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /life-ledger/next-90-days:
    get:
      operationId: getNext90Days
      tags: [life-ledger]
      summary: Get upcoming obligations across all tabs in the next 90 days
      responses:
        "200":
          description: Upcoming obligations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Next90DaysResponse"

  /life-ledger/subscription-audit:
    get:
      operationId: getSubscriptionAudit
      tags: [life-ledger]
      summary: Subscription audit showing essential vs non-essential with costs
      responses:
        "200":
          description: Subscription audit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAuditResponse"

  /reach/files:
    get:
      operationId: listReachFiles
      tags: [reach]
      summary: List all uploaded files for the current user
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReachFile"
    post:
      operationId: createReachFile
      tags: [reach]
      summary: Register an uploaded file (after presigned URL upload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReachFileBody"
      responses:
        "201":
          description: Registered file record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReachFile"

  /reach/files/{id}:
    delete:
      operationId: deleteReachFile
      tags: [reach]
      summary: Delete a file record and its stored object
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for direct GCS upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /user-mode:
    get:
      operationId: getUserMode
      tags: [user-mode]
      summary: Get the user's current mode and colour state
      responses:
        "200":
          description: User mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMode"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertUserMode
      tags: [user-mode]
      summary: Create or update user mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserModeBody"
      responses:
        "200":
          description: Upserted user mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMode"

  /me/permissions:
    get:
      operationId: getMyPermissions
      tags: [me]
      summary: Get the current user's permitted modules for the current environment
      responses:
        "200":
          description: List of permitted modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyPermissionsResponse"

  /ai-drafts:
    get:
      operationId: listAiDrafts
      tags: [ai-drafts]
      summary: List AI drafts for the current user
      parameters:
        - name: lane
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, vision, bizdev, life-ledger, baby-kb, reach, admin]
        - name: draftKind
          in: query
          required: false
          schema:
            type: string
            enum:
              [daily_frame_draft, weekly_frame_draft, vision_alignment_draft, life_ledger_classification_draft, reach_file_summary, bizdev_followup_draft, baby_kb_promotion_draft, baby_kb_assignment_draft]
        - name: reviewState
          in: query
          required: false
          schema:
            type: string
            enum: [draft, needs_review, approval_gated, approved, applied, rejected]
        - name: targetSurfaceKey
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 25
      responses:
        "200":
          description: List of AI drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIDraft"
    post:
      operationId: createAiDraft
      tags: [ai-drafts]
      summary: Create a new AI draft record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAIDraftBody"
      responses:
        "201":
          description: Created AI draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIDraft"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-drafts/{id}:
    get:
      operationId: getAiDraft
      tags: [ai-drafts]
      summary: Get an AI draft by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIDraft"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

