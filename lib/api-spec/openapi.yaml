openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ThetaFrame API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: daily-frames
    description: Daily frame operations
  - name: weekly-frames
    description: Weekly frame operations
  - name: vision-frames
    description: Vision tracker operations
  - name: user-mode
    description: User mode and colour state

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /daily-frames:
    get:
      operationId: listDailyFrames
      tags: [daily-frames]
      summary: List all daily frames for the current user
      responses:
        "200":
          description: List of daily frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyFrame"
    post:
      operationId: createDailyFrame
      tags: [daily-frames]
      summary: Create or update a daily frame (date in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyFrameBody"
      responses:
        "200":
          description: Created or updated daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"

  /daily-frames/{date}:
    get:
      operationId: getDailyFrame
      tags: [daily-frames]
      summary: Get daily frame for a date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertDailyFrame
      tags: [daily-frames]
      summary: Create or update a daily frame
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDailyFrameBody"
      responses:
        "200":
          description: Upserted daily frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFrame"

  /daily-frames/recent:
    get:
      operationId: getRecentDailyFrames
      tags: [daily-frames]
      summary: Get recent daily frames (last 7 days)
      responses:
        "200":
          description: List of recent daily frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyFrame"

  /weekly-frames:
    get:
      operationId: listWeeklyFrames
      tags: [weekly-frames]
      summary: List all weekly frames for the current user
      responses:
        "200":
          description: List of weekly frames
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyFrame"
    post:
      operationId: createWeeklyFrame
      tags: [weekly-frames]
      summary: Create or update a weekly frame (weekStart in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeeklyFrameBody"
      responses:
        "200":
          description: Created or updated weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"

  /weekly-frames/{weekStart}:
    get:
      operationId: getWeeklyFrame
      tags: [weekly-frames]
      summary: Get weekly frame for a week
      parameters:
        - name: weekStart
          in: path
          required: true
          schema:
            type: string
            description: Week start date in YYYY-MM-DD format (Monday)
      responses:
        "200":
          description: Weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertWeeklyFrame
      tags: [weekly-frames]
      summary: Create or update a weekly frame
      parameters:
        - name: weekStart
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWeeklyFrameBody"
      responses:
        "200":
          description: Upserted weekly frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyFrame"

  /vision-frames:
    get:
      operationId: getVisionFrameCollection
      tags: [vision-frames]
      summary: Get the current user's vision frame (collection alias)
      responses:
        "200":
          description: Vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createVisionFrame
      tags: [vision-frames]
      summary: Create or update the user's vision frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVisionFrameBody"
      responses:
        "200":
          description: Created or updated vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"

  /vision-frames/me:
    get:
      operationId: getVisionFrame
      tags: [vision-frames]
      summary: Get the user's vision frame
      responses:
        "200":
          description: Vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertVisionFrame
      tags: [vision-frames]
      summary: Create or update the user's vision frame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertVisionFrameBody"
      responses:
        "200":
          description: Upserted vision frame
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionFrame"

  /user-mode:
    get:
      operationId: getUserMode
      tags: [user-mode]
      summary: Get the user's current mode and colour state
      responses:
        "200":
          description: User mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMode"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertUserMode
      tags: [user-mode]
      summary: Create or update user mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserModeBody"
      responses:
        "200":
          description: Upserted user mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMode"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    TierTask:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        completed:
          type: boolean
        emoji:
          type: ["string", "null"]
      required:
        - id
        - text
        - completed

    TimeBlock:
      type: object
      properties:
        id:
          type: string
        startTime:
          type: string
          description: HH:MM format
        action:
          type: string
      required:
        - id
        - startTime
        - action

    DailyFrame:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        date:
          type: string
          description: YYYY-MM-DD
        colourState:
          type: string
          enum: [green, yellow, red, blue, purple]
        tierA:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        tierB:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        timeBlocks:
          type: array
          items:
            $ref: "#/components/schemas/TimeBlock"
        microWin:
          type: ["string", "null"]
        skipProtocolUsed:
          type: boolean
        skipProtocolChoice:
          type: ["string", "null"]
          enum: ["micro-win", "intentional-recovery", null]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - date
        - colourState
        - tierA
        - tierB
        - timeBlocks
        - skipProtocolUsed

    CreateDailyFrameBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        colourState:
          type: string
          enum: [green, yellow, red, blue, purple]
        tierA:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        tierB:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        timeBlocks:
          type: array
          items:
            $ref: "#/components/schemas/TimeBlock"
        microWin:
          type: ["string", "null"]
        skipProtocolUsed:
          type: boolean
        skipProtocolChoice:
          type: ["string", "null"]
          enum: ["micro-win", "intentional-recovery", null]
      required:
        - date
        - colourState
        - tierA
        - tierB
        - timeBlocks
        - skipProtocolUsed

    UpsertDailyFrameBody:
      type: object
      properties:
        colourState:
          type: string
          enum: [green, yellow, red, blue, purple]
        tierA:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        tierB:
          type: array
          items:
            $ref: "#/components/schemas/TierTask"
        timeBlocks:
          type: array
          items:
            $ref: "#/components/schemas/TimeBlock"
        microWin:
          type: ["string", "null"]
        skipProtocolUsed:
          type: boolean
        skipProtocolChoice:
          type: ["string", "null"]
          enum: ["micro-win", "intentional-recovery", null]
      required:
        - colourState
        - tierA
        - tierB
        - timeBlocks
        - skipProtocolUsed

    WeeklyStep:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        emoji:
          type: ["string", "null"]
      required:
        - id
        - text

    WeeklyFrame:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        weekStart:
          type: string
          description: Week start date YYYY-MM-DD (Monday)
        theme:
          type: ["string", "null"]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        nonNegotiables:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        recoveryPlan:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - weekStart
        - steps
        - nonNegotiables

    CreateWeeklyFrameBody:
      type: object
      properties:
        weekStart:
          type: string
          description: Week start date YYYY-MM-DD (Monday)
        theme:
          type: ["string", "null"]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        nonNegotiables:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        recoveryPlan:
          type: ["string", "null"]
      required:
        - weekStart
        - steps
        - nonNegotiables

    UpsertWeeklyFrameBody:
      type: object
      properties:
        theme:
          type: ["string", "null"]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        nonNegotiables:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyStep"
        recoveryPlan:
          type: ["string", "null"]
      required:
        - steps
        - nonNegotiables

    VisionGoal:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        emoji:
          type: ["string", "null"]
      required:
        - id
        - text

    VisionFrame:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        goals:
          type: array
          items:
            $ref: "#/components/schemas/VisionGoal"
        nextSteps:
          type: array
          items:
            $ref: "#/components/schemas/VisionGoal"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - goals
        - nextSteps

    UpsertVisionFrameBody:
      type: object
      properties:
        goals:
          type: array
          items:
            $ref: "#/components/schemas/VisionGoal"
        nextSteps:
          type: array
          items:
            $ref: "#/components/schemas/VisionGoal"
      required:
        - goals
        - nextSteps

    UserMode:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        mode:
          type: string
          enum: [explore, build, release]
        colourState:
          type: string
          enum: [green, yellow, red, blue, purple]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - mode
        - colourState

    UpsertUserModeBody:
      type: object
      properties:
        mode:
          type: string
          enum: [explore, build, release]
        colourState:
          type: string
          enum: [green, yellow, red, blue, purple]
      required:
        - mode
        - colourState
